name: tangent_sdk
description: "A comprehensive SDK wrapper for Firebase, Mixpanel, Adjust, and Superwall with unified analytics, crash reporting, and paywall management."
version: 0.2.2
homepage:

environment:
  sdk: ^3.7.0
  flutter: ">=3.22.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.tangent_sdk
        pluginClass: TangentSdkPlugin
      ios:
        pluginClass: TangentSdkPlugin

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_analytics: ^12.0.0
  firebase_core: ^4.3.0
  firebase_crashlytics: ^5.0.6
  firebase_app_check: ^0.4.1+3

  # Analytics
  mixpanel_flutter: ^2.4.4
  adjust_sdk: ^5.5.0

  # In-App Purchase
  in_app_purchase: ^3.2.0

  # App Tracking Transparency
  app_tracking_transparency: ^2.0.6+1

  # In-App Review
  in_app_review: ^2.0.10

  # Utilities
  meta: ^1.11.0

  # Superwall
  superwallkit_flutter: ^2.4.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

